<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Sent</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#8e8db0,#494857,#a09fb3);
  animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:left;}
  100%{background-position:right;}
}

.success-card{
  background:#fff;
  padding:45px 35px;
  border-radius:18px;
  text-align:center;
  width:350px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.check{
  width:80px;
  height:80px;
  background:#6c63ff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 20px;
  font-size:40px;
  color:#fff;
  box-shadow:0 0 20px rgba(108,99,255,.6);
  animation:pop 0.6s ease;
}

@keyframes pop{
  0%{transform:scale(0);}
  80%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

h2{
  color:#333;
  margin-bottom:10px;
}

p{
  color:#666;
  font-size:15px;
  margin-bottom:25px;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  border-radius:30px;
  text-decoration:none;
  color:#fff;
  background:#6c63ff;
  transition:0.3s;
  font-weight:600;
}

.btn:hover{
  background:#5148d8;
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="success-card">

<div class="check">✓</div>

<h2>Message Sent!</h2>

<p>Your message has been successfully submitted.  
Our team will contact you shortly.</p>

<a href="index.php" class="btn">Back to Home</a>

</div>

</body>
</html>
