<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rooms to Design</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f3f3;
    margin:0;
}

/* HEADER */
.header {
    background:white;
    padding:18px 40px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo {
    font-weight:700;
    letter-spacing:3px;
}

/* PROGRESS */
.top-bar{
    background:white;
    padding:20px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #eee;
}

.progress-wrapper{
    width:600px;
}

.progress-bar{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.progress-line{
    position:absolute;
    top:9px;
    left:0;
    right:0;
    height:2px;
    background:#e5e5e5;
}

.progress-fill{
    position:absolute;
    top:9px;
    left:0;
    height:2px;
    background:#6b5a64;
    width:0%;
    transition:0.4s ease;
}

/* STEP */
.step{
    text-align:center;
    cursor:pointer;
    z-index:2;
    position:relative;
}

.circle{
    width:20px;
    height:20px;
    border-radius:50%;
    border:2px solid #ddd;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    transition:0.3s;
}

.label{
    font-size:12px;
    margin-top:6px;
    color:#888;
}

/* ACTIVE */
.step.active .circle{
    border:6px solid #6b5a64;
    transform:scale(1.2);
}

/* DONE */
.step.done .circle{
    background:#6b5a64;
    border:2px solid #6b5a64;
    color:white;
    font-size:12px;
}
/* CARD */
.wrapper{
    display:flex;
    justify-content:center;
    margin-top:60px;
}

.card{
    width:520px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.card h2{
    text-align:center;
    margin-bottom:8px;
}

.card p{
    text-align:center;
    font-size:14px;
    color:#777;
    margin-bottom:25px;
}

.card p span{
    color:#d84f57;
    cursor:pointer;
}

.title {
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.subtitle {
    text-align:center;
    color:#888;
    margin:10px 0 30px;
}

/* ROOM ROW */
.room {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
    border-radius:8px;
    border:1px solid #eee;
    margin-bottom:12px;
}

.controls {
    display:flex;
    align-items:center;
    gap:14px;
}

.btn {
    width:28px;
    height:28px;
    border-radius:50%;
    border:none;
    background:#e56b6f;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.count {
    font-weight:600;
}

/* FOOTER */
.footer {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    border-top:1px solid #eee;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
}

.back {
    color:#e56b6f;
    cursor:pointer;
}

.next {
    background:#e56b6f;
    color:white;
    border:none;
    padding:14px 40px;
    border-radius:30px;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>
<body>
<!-- HEADER -->

<div class="top-bar">

    <div class="logo">BestArt</div>

    <div class="progress-wrapper">

        <div class="progress-bar">
            <div class="progress-line"></div>
            <div class="progress-fill" id="fill"></div>

            <div class="step" data-step="1">
                <div class="circle"></div>
                <div class="label">BHK TYPE</div>
            </div>

            <div class="step" data-step="2">
                <div class="circle"></div>
                <div class="label">ROOMS TO DESIGN</div>
            </div>

            <div class="step" data-step="3">
                <div class="circle"></div>
                <div class="label">PACKAGE</div>
            </div>

            <div class="step" data-step="4">
                <div class="circle"></div>
                <div class="label">GET QUOTE</div>
            </div>
        </div>

    </div>

    <div class="counter"><span id="counter">1</span>/4</div>

</div>

<div class="wrapper">
<div class="card">
    <h2>Select your BHK type</h2>
<p>To know more about this, <span>click here</span></p>

    <div class="room" data-room="living">
        Living Room
        <div class="controls">
            <button class="btn minus">−</button>
            <div class="count">1</div>
            <button class="btn plus">+</button>
        </div>
    </div>

    <div class="room" data-room="kitchen">
        Kitchen
        <div class="controls">
            <button class="btn minus">−</button>
            <div class="count">1</div>
            <button class="btn plus">+</button>
        </div>
    </div>

    <div class="room" data-room="bedroom">
        Bedroom
        <div class="controls">
            <button class="btn minus">−</button>
            <div class="count">1</div>
            <button class="btn plus">+</button>
        </div>
    </div>

    <div class="room" data-room="bathroom">
        Bathroom
        <div class="controls">
            <button class="btn minus">−</button>
            <div class="count">1</div>
            <button class="btn plus">+</button>
        </div>
    </div>

    <div class="room" data-room="dining">
        Dining
        <div class="controls">
            <button class="btn minus">−</button>
            <div class="count">1</div>
            <button class="btn plus">+</button>
        </div>
    </div>

</div>

<div class="footer">
   <div class="back" onclick="goBack()">BACK</div>
    <button class="next" onclick="goNext()">NEXT</button>
</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const steps = document.querySelectorAll(".step");
    const fill = document.getElementById("fill");
    const counter = document.getElementById("counter");

    /* AUTO DETECT STEP BASED ON PAGE */
    function detectCurrentStep() {
        const page = window.location.pathname;

        if (page.includes("full-home")) return 1;
        if (page.includes("room")) return 2;
        if (page.includes("package")) return 3;
        if (page.includes("quote")) return 4;

        return 1;
    }

    let currentStep = detectCurrentStep();

    function updateStepper() {

        steps.forEach(step => {
            const stepNumber = parseInt(step.dataset.step);
            step.classList.remove("active", "done");

            const circle = step.querySelector(".circle");
            circle.innerHTML = "";

            if (stepNumber < currentStep) {
                step.classList.add("done");
                circle.innerHTML = "✔";
            } 
            else if (stepNumber === currentStep) {
                step.classList.add("active");
            }
        });

        fill.style.width =
            ((currentStep - 1) / (steps.length - 1)) * 100 + "%";

        counter.textContent = currentStep;
    }

    updateStepper();

    //* STEP CLICK */
    window.goNext = function () {
        localStorage.setItem("step", 3);
        window.location.href = "package.html";
    };

    window.goBack = function () {
        localStorage.setItem("resetRooms", "true");
        window.location.href = "full-home.html";
    };

   /* =========================
   ROOM COUNTER MANAGEMENT
========================== */

const cameFromNext = localStorage.getItem("cameFromNext") === "true";
let roomsData = JSON.parse(localStorage.getItem("roomsData")) || {};

document.querySelectorAll(".room").forEach(room => {

    const roomName = room.dataset.room;
    const minusBtn = room.querySelector(".minus");
    const plusBtn = room.querySelector(".plus");
    const countEl = room.querySelector(".count");

    // Reset if page reload OR back navigation
    if (!cameFromNext) {
        roomsData[roomName] = 1;
    }

    if (roomsData[roomName] === undefined) {
        roomsData[roomName] = 1;
    }

    let count = roomsData[roomName];
    countEl.textContent = count;

    function saveRooms() {
        roomsData[roomName] = count;
        localStorage.setItem("roomsData", JSON.stringify(roomsData));
    }

    plusBtn.onclick = () => {
        count++;
        countEl.textContent = count;
        saveRooms();
    };

    minusBtn.onclick = () => {
        if (count > 0) count--;
        countEl.textContent = count;
        saveRooms();
    };
});

// Clear NEXT flag after page loads
localStorage.removeItem("cameFromNext");

// next and back functions
function goNext() {
    localStorage.setItem("cameFromNext", "true");
    window.location.href = "package.html";
}
function goBack() {
    localStorage.removeItem("roomsData");
    window.location.href = "full-home.html";
}
function submitQuote() {
    localStorage.clear();
    window.location.href = "index.html";
}

    /* INIT */
    updateStepper();

});
</script>
</body>
</html>
